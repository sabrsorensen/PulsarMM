name: Update Curated Mod List
concurrency:
  group: curated-list-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight

jobs:
  build-and-deploy:
    name: Update Curated Mod List Data
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Step 1: Check out the repository's code
      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
      # Step 2: Set up the Node.js environment
      - name: Checkout main branch for script
        uses: actions/checkout@v4
        with:
          ref: main
          path: ./.github/main-branch-checkout
          sparse-checkout: |
            .github/scripts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Step 3: Auto-populate mod_warnings.json with all NMS mods
      - name: Populate mod_warnings.json with all No Man's Sky mods
        run: node ./.github/main-branch-checkout/.github/scripts/populate_mod_warnings.cjs
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}

      # Step 4: Generate curated_list.json from populated mod_warnings.json
      - name: Generate curated_list.json
        run: node ./.github/main-branch-checkout/.github/scripts/generate_curated_list.cjs
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}

      # Step 5: Automatically commit the newly generated files back to the repository
      - name: Commit and push changes to the data branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Auto-update mod registry and curated mod list"
          file_pattern: mod_warnings.json curated/curated_list.json

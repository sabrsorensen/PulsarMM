name: Build Application
concurrency:
    group: build-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

on:
    push:
        branches: [main]
        paths-ignore:
            - "*.md"
            - "LICENSE"
            - "screenshots/**"
            - ".vscode/**"
            - ".gitignore"
            - ".github/scripts/**"
            - ".github/workflows/update_curated_list.yml"
            - ".github/workflows/publish-flatpak-repo.yml"
    pull_request:
        branches: [main]
        paths-ignore:
            - "*.md"
            - "LICENSE"
            - "screenshots/**"
            - ".vscode/**"
            - ".gitignore"
            - ".github/scripts/**"
            - ".github/workflows/update_curated_list.yml"
            - ".github/workflows/publish-flatpak-repo.yml"
    workflow_call:
        inputs:
            release:
                description: "Upload to GitHub Release instead of artifacts"
                type: boolean
                default: false
            tag_name:
                description: "Tag name for release upload"
                type: string
                default: ""
            targets:
                description: "Comma-separated build targets: windows,linux,flatpak"
                type: string
                default: "windows,linux,flatpak"
    workflow_dispatch:
        inputs:
            release:
                description: "Upload to GitHub Release instead of artifacts"
                type: boolean
                default: false
            tag_name:
                description: "Tag name for release upload"
                type: string
                default: ""
            targets:
                description: "Comma-separated build targets: windows,linux,flatpak"
                type: string
                default: "windows,linux,flatpak"

jobs:
    quality-gate:
        name: Quality Gate (Tests + Coverage)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Rust
              uses: Swatinem/rust-cache@v2

            - name: Install Rust Test System Dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    pkg-config \
                    libssl-dev \
                    libgtk-3-dev \
                    libwebkit2gtk-4.1-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    libxdo-dev \
                    libxcb-shape0-dev \
                    libxcb-xfixes0-dev

            - name: Install Dependencies
              run: npm ci

            - name: Run Tests with Coverage Gate
              run: npm run test:coverage

            - name: Run Rust Test Suite
              run: npm run test:rust

            - name: Install Rust Coverage Tooling
              uses: taiki-e/install-action@cargo-llvm-cov

            - name: Run Rust Coverage Summary
              run: npm run test:rust:coverage

    determine-targets:
        name: Determine Build Targets
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.set-matrix.outputs.matrix }}
        steps:
            - id: set-matrix
              run: |
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    # PR builds: Windows, Linux, and Flatpak for packaging coverage
                    echo 'matrix={"include":[{"target":"windows","os":"windows-latest"},{"target":"linux","os":"ubuntu-22.04"},{"target":"flatpak","os":"ubuntu-latest"}]}' >> $GITHUB_OUTPUT
                  else
                    # Release/manual builds: parse targets input
                    targets="${{ inputs.targets || 'windows,linux,flatpak' }}"
                    matrix='{"include":['

                    if [[ "$targets" == *"windows"* ]]; then
                      matrix+='{"target":"windows","os":"windows-latest"},'
                    fi
                    if [[ "$targets" == *"linux"* ]]; then
                      matrix+='{"target":"linux","os":"ubuntu-22.04"},'
                    fi
                    if [[ "$targets" == *"flatpak"* ]]; then
                      matrix+='{"target":"flatpak","os":"ubuntu-latest"},'
                    fi

                    # Remove trailing comma and close
                    matrix="${matrix%,}]}"
                    echo "matrix=$matrix" >> $GITHUB_OUTPUT
                  fi

    build:
        name: Build ${{ matrix.target }}
        needs: [quality-gate, determine-targets]
        runs-on: ${{ matrix.os }}
        strategy:
            matrix: ${{ fromJSON(needs.determine-targets.outputs.matrix) }}
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4

            - name: Extract Version from Tag
              id: version
              if: startsWith(github.ref, 'refs/tags/v') || inputs.tag_name != ''
              shell: bash
              run: |
                  if [ -n "${{ inputs.tag_name }}" ]; then
                    VERSION="${{ inputs.tag_name }}"
                  else
                    VERSION=${GITHUB_REF#refs/tags/v}
                  fi
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Extracted version: $VERSION"

            - name: Update Version Numbers
              if: steps.version.outputs.version != ''
              shell: bash
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  # Update package.json
                  if [[ "$RUNNER_OS" == "Windows" ]]; then
                    sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json
                    sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
                  else
                    sed -i 's/"version": "[^"]*"/"version": "'$VERSION'"/' package.json
                    sed -i 's/"version": "[^"]*"/"version": "'$VERSION'"/' src-tauri/tauri.conf.json
                  fi

            - name: Determine packaging artifact names
              id: artifact_names
              if: matrix.target == 'linux' || matrix.target == 'flatpak'
              shell: bash
              env:
                  VERSION_TAG: ${{ steps.version.outputs.version }}
                  EVENT_NAME: ${{ github.event_name }}
                  PR_NUMBER: ${{ github.event.pull_request.number || '' }}
                  GIT_SHA: ${{ github.sha }}
              run: |
                  if [ -n "$VERSION_TAG" ]; then
                    VERSION="$VERSION_TAG"
                  elif [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_NUMBER" ]; then
                    VERSION="pr${PR_NUMBER}-${GIT_SHA::7}"
                  else
                    VERSION="dev-${GIT_SHA::7}"
                  fi

                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "appimage=PulsarMM-${VERSION}-x86_64.AppImage" >> "$GITHUB_OUTPUT"
                  echo "appimage_sha256=PulsarMM-${VERSION}-x86_64.AppImage.sha256" >> "$GITHUB_OUTPUT"
                  echo "flatpak=PulsarMM-${VERSION}-x86_64.flatpak" >> "$GITHUB_OUTPUT"
                  echo "flatpak_sha256=PulsarMM-${VERSION}-x86_64.flatpak.sha256" >> "$GITHUB_OUTPUT"

            # === Windows Build ===
            - name: Install Rust (Windows)
              if: matrix.target == 'windows'
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-pc-windows-msvc

            - name: Install Node.js (Windows)
              if: matrix.target == 'windows'
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Cache Rust (Windows)
              if: matrix.target == 'windows'
              uses: Swatinem/rust-cache@v2

            - name: Install Dependencies (Windows)
              if: matrix.target == 'windows'
              run: npm ci

            - name: Build Windows Application
              if: matrix.target == 'windows'
              run: npm run tauri build

            # === Linux Build ===
            - name: Install Nix (Linux)
              if: matrix.target == 'linux'
              uses: cachix/install-nix-action@v31
              with:
                  extra_nix_config: |
                      experimental-features = nix-command flakes

            - name: Build Linux AppImage
              if: matrix.target == 'linux'
              run: |
                  PULSAR_SKIP_TEST_GATE=1 \
                  PULSAR_APPIMAGE_OUTPUT="${{ steps.artifact_names.outputs.appimage }}" \
                  nix run .#appimage

            - name: Generate Linux Checksums
              if: matrix.target == 'linux'
              shell: bash
              run: |
                  sha256sum "${{ steps.artifact_names.outputs.appimage }}" > "${{ steps.artifact_names.outputs.appimage_sha256 }}"

            # === Flatpak Build ===
            - name: Install Nix (Flatpak)
              if: matrix.target == 'flatpak'
              uses: cachix/install-nix-action@v31
              with:
                  extra_nix_config: |
                      experimental-features = nix-command flakes

            - name: Build Flatpak Package
              if: matrix.target == 'flatpak'
              run: |
                  PULSAR_SKIP_TEST_GATE=1 \
                  FLATPAK_INSTALL_SCOPE=system \
                  PULSAR_FLATPAK_OUTPUT="${{ steps.artifact_names.outputs.flatpak }}" \
                  nix run .#flatpak

            - name: Generate Flatpak Checksums
              if: matrix.target == 'flatpak'
              shell: bash
              run: |
                  sha256sum "${{ steps.artifact_names.outputs.flatpak }}" > "${{ steps.artifact_names.outputs.flatpak_sha256 }}"

            # === Upload Artifacts ===
            - name: Upload Windows Artifacts
              if: matrix.target == 'windows' && (!inputs.release)
              uses: actions/upload-artifact@v4
              with:
                  name: windows-artifacts
                  path: |
                      src-tauri/target/release/bundle/msi/*.msi
                      src-tauri/target/release/bundle/nsis/*.exe

            - name: Upload Linux Artifacts
              if: matrix.target == 'linux' && (!inputs.release)
              uses: actions/upload-artifact@v4
              with:
                  name: linux-artifacts
                  path: |
                      ${{ steps.artifact_names.outputs.appimage }}
                      ${{ steps.artifact_names.outputs.appimage_sha256 }}

            - name: Upload Flatpak Artifacts
              if: matrix.target == 'flatpak' && (!inputs.release)
              uses: actions/upload-artifact@v4
              with:
                  name: flatpak-artifacts
                  path: |
                      ${{ steps.artifact_names.outputs.flatpak }}
                      ${{ steps.artifact_names.outputs.flatpak_sha256 }}

            # === Upload to Release ===
            - name: Upload Windows to Release
              if: matrix.target == 'windows' && inputs.release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ inputs.tag_name }}
                  draft: true
                  prerelease: false
                  files: |
                      src-tauri/target/release/bundle/msi/*.msi
                      src-tauri/target/release/bundle/nsis/*.exe

            - name: Upload Linux to Release
              if: matrix.target == 'linux' && inputs.release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ inputs.tag_name }}
                  draft: true
                  prerelease: false
                  files: |
                      ${{ steps.artifact_names.outputs.appimage }}
                      ${{ steps.artifact_names.outputs.appimage_sha256 }}

            - name: Upload Flatpak to Release
              if: matrix.target == 'flatpak' && inputs.release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ inputs.tag_name }}
                  draft: true
                  prerelease: false
                  files: |
                      ${{ steps.artifact_names.outputs.flatpak }}
                      ${{ steps.artifact_names.outputs.flatpak_sha256 }}
